<section id="proyectos" class="proyectos">
    <div class="container projects-shell">
        <p class="projects-kicker">{{ labels().kicker }}</p>
        <h2>{{ labels().title }}</h2>

        <div class="projects-grid">
            <article class="project-card">
                <div class="card-top">
                    <span class="project-icon" aria-hidden="true">
                        <i class="bi bi-box-seam"></i>
                    </span>
                    <span class="project-badge1">{{ labels().card1Badge }}</span>
                </div>
                <h3>{{ labels().card1Title }}</h3>
                <p>{{ labels().card1Description }}</p>
                <div class="project-meta">
                    <div class="project-tags-group">
                        <span class="project-tags">Java</span>
                        <span class="project-tags">Spring Boot</span>
                        <span class="project-tags">MySQL</span>
                        <span class="project-tags">Angular</span>
                    </div>
                    <div class="social-icons">
                        <a href="https://github.com/Serus38/Test-dev.git" target="_blank" rel="noopener noreferrer">
                            <img class="social-icon github-icon" src="/img/github.png" alt="GitHub">
                        </a>
                    </div>
                </div>
            </article>

            <article class="project-card">
                <div class="card-top">
                    <span class="project-icon" aria-hidden="true">
                        <i class="bi bi-file-earmark-bar-graph"></i>
                    </span>
                    <span class="project-badge2">{{ labels().card2Badge }}</span>
                </div>
                <h3>{{ labels().card2Title }}</h3>
                <p>{{ labels().card2Description }}</p>
                <div class="project-meta">
                    <div class="project-tags-group">

                        <span class="project-tags">Power BI</span>
                        <span class="project-tags">SharePoint</span>
                        <span class="project-tags">Excel</span>
                    </div>

                </div>
            </article>
