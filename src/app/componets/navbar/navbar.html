<nav class="navbar">
    <div class="nav-container">
        <div class="logo">{{ labels().logo }}</div>

        <ul class="nav-menu" [class.nav-menu-open]="isMenuOpen()">
            <li><a href="#inicio" class="nav-link" (click)="closeMenu()">{{ labels().home }}</a></li>
            <li><a href="#about" class="nav-link" (click)="closeMenu()">{{ labels().about }}</a></li>
            <li><a href="#stack-tec" class="nav-link" (click)="closeMenu()">{{ labels().technologies }}</a></li>
            <li><a href="#proyectos" class="nav-link" (click)="closeMenu()">{{ labels().projects }}</a></li>
            <li><a href="#contact" class="nav-link" (click)="closeMenu()">{{ labels().contact }}</a></li>
        </ul>

        <div class="language-switcher" [attr.aria-label]="labels().languageAriaLabel">
            <button
                id="langEs"
                class="lang-btn"
                type="button"
                [class.active]="isLanguageSelected('es')"
                [attr.aria-pressed]="isLanguageSelected('es')"
                (click)="changeLanguage('es')"
            >
                ES
            </button>
            <button
                id="langEn"
                class="lang-btn"
                type="button"
                [class.active]="isLanguageSelected('en')"
                [attr.aria-pressed]="isLanguageSelected('en')"
                (click)="changeLanguage('en')"
            >
                EN
            </button>
        </div>

        <button
            class="hamburger"
            type="button"
            [class.active]="isMenuOpen()"
            [attr.aria-expanded]="isMenuOpen()"
            [attr.aria-label]="labels().menuToggleAriaLabel"
            (click)="toggleMenu()"
        >
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>
</nav>
