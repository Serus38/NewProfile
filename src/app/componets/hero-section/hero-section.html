 <section id="inicio" class="hero">
        <div class="hero-container">
            <div class="hero-content">
                <h1>{{ labels().title }} <span class="highlight">{{ labels().titleHighlight }}</span></h1>
                <p class="hero-subtitle">{{ labels().subtitle }}</p>
                <p class="hero-description">{{ labels().description }}</p>
                
                <div class="hero-buttons">
                    <a href="#proyectos" class="cta-button">{{ labels().viewProjects }}</a>
                    <a href="/docs/CV_Sergio_Rivera_Urrea_ATS.pdf" class="cta-button secondary" target="_blank" rel="noopener noreferrer">{{ labels().downloadCv }}</a>
                </div>

                <div class="hero-contact">
                    <div class="contact-item">
                        <span class="contact-label">{{ labels().email }}</span>
                        <span class="contact-value">matambita08@gmail.com</span>
                    </div>
                    <div class="contact-item">
                        <span class="contact-label">{{ labels().phone }}</span>
                        <span class="contact-value">+57 301 731 9664</span>
                    </div>
                    <div class="social-icons">
                        <a href="https://www.linkedin.com/in/sergio-rivera-urrea" target="_blank" rel="noopener noreferrer">
                            <img class="social-icon" src="/img/icon-linkedin.png" alt="LinkedIn">
                        </a>
                        <a href="https://github.com/Serus38" target="_blank" rel="noopener noreferrer">
                            <img class="social-icon github-icon" src="/img/github.png" alt="GitHub">
                        </a>
                    </div>
                </div>
            </div>

            <div class="hero-image">
                <img src="/img/perfil%20profesional.png" [alt]="labels().profileAlt">
            </div>
        </div>
    </section>
