<section id="contact" class="contact">
    <div class="container contact-shell">
        <p class="contact-kicker">{{ labels().kicker }}</p>

        <div class="contact-actions" role="group" [attr.aria-label]="labels().channelsAriaLabel">
            @for (action of contactActions(); track action.key) {
                <a
                    class="contact-action"
                    [href]="action.href"
                    [attr.target]="action.target ?? null"
                    [attr.rel]="action.rel ?? null"
                    [attr.aria-label]="labels().contactByPrefix + ' ' + action.label"
                >
                    <span class="contact-action-icon" aria-hidden="true">
                        <img
                            [ngSrc]="action.icon"
                            [alt]="''"
                            width="20"
                            height="20"
                            loading="lazy"
                        >
                    </span>
                    <span>{{ action.label }}</span>
                </a>
            }
        </div>
    </div>
</section>
