<section id="stack-tec" class="stack-tec">
    <div class="container stack-shell">
        <p class="stack-kicker">{{ labels().kicker }}</p>
        <h2>{{ labels().title }}</h2>
        <div class="stack-grid">
            @for (technology of technologies; track technology.name) {
                <article class="stack-card">
                    <img
                        [ngSrc]="technology.image"
                        [alt]="technology.name"
                        width="40"
                        height="40"
                    >
                </article>
            }
        </div>
    </div>

</section>
